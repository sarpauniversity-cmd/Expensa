        const afternoonMeals = ["Biriyani", "Chicken Rice", "Non Veg Meals", "Veg Meals", "Variety Rice", "Mix Rice", "Curd Rice", "Chapati", "Parotta"];
        const nightMeals = ["Biriyani", "Chicken Rice", "Chapati", "Parotta", "Dosa"];

        // Utilities
        const formatCurrency = (amount) => `₹${parseFloat(amount || 0).toLocaleString('en-IN')}`;
        const formatCurrencyPDF = (amount) => `Rs. ${parseFloat(amount || 0).toLocaleString('en-IN')}`; // Clean for PDF
        const formatDate = (date) => new Date(date).toLocaleDateString('en-IN', { weekday: 'short', day: 'numeric', month: 'short' });
        const formatDateFull = (date) => new Date(date).toLocaleDateString('en-IN', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });

        // UI Components
        const Toast = ({ message, type, onClose }) => (
            <motion.div initial={{ opacity: 0, y: -20, x: '-50%' }} animate={{ opacity: 1, y: 0, x: '-50%' }} exit={{ opacity: 0, y: -20, x: '-50%' }} className={`fixed top-6 left-1/2 z-50 px-6 py-4 rounded-neu-sm shadow-neu-raised flex items-center gap-3 bg-neu-base`}>
                <div className={`w-10 h-10 rounded-full shadow-neu-inset flex items-center justify-center ${type === 'error' ? 'text-red-500' : 'text-neu-accent-secondary'}`}>
                    <Icon name={type === 'error' ? 'AlertCircle' : 'CheckCircle'} size={20} />
                </div>
                <span className="font-medium text-neu-fg">{message}</span>
            </motion.div>
        );

        const Button = ({ children, variant = 'primary', className = '', ...props }) => {
            const baseClass = "px-6 py-3 rounded-neu-sm font-semibold transition-all duration-300 flex items-center justify-center gap-2 disabled:opacity-50 outline-none";
            const variants = {
                primary: "bg-neu-accent text-white shadow-[5px_5px_10px_rgb(163,177,198,0.6),-5px_-5px_10px_rgba(255,255,255,0.5)] hover:shadow-[7px_7px_14px_rgb(163,177,198,0.7),-7px_-7px_14px_rgba(255,255,255,0.6)] hover:-translate-y-0.5 active:translate-y-0.5 active:shadow-[inset_4px_4px_8px_rgba(0,0,0,0.2),inset_-4px_-4px_8px_rgba(255,255,255,0.1)] focus:ring-2 focus:ring-neu-accent focus:ring-offset-2 focus:ring-offset-neu-base",
                secondary: "bg-neu-base text-neu-fg shadow-neu-raised hover:shadow-neu-raised-hover hover:-translate-y-0.5 active:translate-y-0.5 active:shadow-neu-inset focus:ring-2 focus:ring-neu-accent focus:ring-offset-2 focus:ring-offset-neu-base",
                ghost: "bg-transparent text-neu-muted hover:text-neu-fg hover:bg-neu-base hover:shadow-neu-raised-sm focus:ring-2 focus:ring-neu-accent focus:ring-offset-2 focus:ring-offset-neu-base"
            };
            return <motion.button whileTap={{ scale: 0.98 }} className={`${baseClass} ${variants[variant]} ${className}`} {...props}>{children}</motion.button>;
        };

        const Input = ({ label, icon, className = '', ...props }) => (
            <div className="space-y-2">
                {label && <label className="text-sm font-medium text-neu-muted">{label}</label>}
                <div className="relative">
                    {icon && <span className="absolute left-4 top-1/2 -translate-y-1/2 text-neu-muted"><Icon name={icon} size={20} /></span>}
                    <input className={`w-full px-4 py-3.5 ${icon ? 'pl-12' : ''} bg-neu-base shadow-neu-inset rounded-neu-sm text-neu-fg placeholder-neu-placeholder focus:outline-none focus:shadow-neu-inset-deep focus:ring-2 focus:ring-neu-accent focus:ring-offset-2 focus:ring-offset-neu-base transition-all duration-300 ${className}`} {...props} />
                </div>
            </div>
        );

        const Card = ({ children, className = '', hover = true, inset = false, ...props }) => (
            <motion.div initial={{ opacity: 0, y: 20 }} animate={{ opacity: 1, y: 0 }} whileHover={hover && !inset ? { y: -2 } : {}} className={`bg-neu-base ${inset ? 'shadow-neu-inset' : 'shadow-neu-raised'} rounded-neu p-6 md:p-8 transition-all duration-300 ${hover && !inset ? 'hover:shadow-neu-raised-hover' : ''} ${className}`} {...props}>{children}</motion.div>
        );

        const IconWell = ({ children, className = '', size = 'md' }) => {
            const sizes = { sm: 'w-10 h-10', md: 'w-12 h-12', lg: 'w-16 h-16' };
            return <div className={`${sizes[size]} rounded-full shadow-neu-inset-deep flex items-center justify-center ${className}`}>{children}</div>;
        };

        const ProgressRing = ({ percentage, size = 120, strokeWidth = 10, color = '#6C63FF' }) => {
            const radius = (size - strokeWidth) / 2;
            const circumference = radius * 2 * Math.PI;
            const offset = circumference - (percentage / 100) * circumference;
            return (
                <div className="relative" style={{ width: size, height: size }}>
                    <svg className="transform -rotate-90" width={size} height={size}>
                        <circle cx={size / 2} cy={size / 2} r={radius} fill="none" stroke="transparent" strokeWidth={strokeWidth} className="shadow-neu-inset" />
                        <circle cx={size / 2} cy={size / 2} r={radius} fill="none" stroke="#E0E5EC" strokeWidth={strokeWidth} style={{ filter: 'drop-shadow(inset 3px 3px 6px rgb(163,177,198,0.6))' }} />
                        <motion.circle cx={size / 2} cy={size / 2} r={radius} fill="none" stroke={color} strokeWidth={strokeWidth} strokeLinecap="round" initial={{ strokeDashoffset: circumference }} animate={{ strokeDashoffset: offset }} transition={{ duration: 1, ease: "easeOut" }} style={{ strokeDasharray: circumference }} />
                    </svg>
                    <div className="absolute inset-0 flex items-center justify-center"><span className="text-2xl font-bold font-display text-neu-fg">{Math.round(percentage)}%</span></div>
                </div>
            );
        };

        // --- PAGES ---

        // Landing Page
        const LandingPage = ({ onNavigate }) => {
            return (
                <div className="min-h-screen">
                    <nav className="flex justify-between items-center p-6 max-w-7xl mx-auto">
                        <motion.div initial={{ opacity: 0, x: -20 }} animate={{ opacity: 1, x: 0 }} className="flex items-center gap-3">
                            <IconWell size="md" className="text-neu-accent"><Icon name="Wallet" size={24} /></IconWell>
                            <span className="text-2xl font-extrabold font-display text-neu-fg tracking-tight">Expensa</span>
                        </motion.div>
                        <motion.div initial={{ opacity: 0, x: 20 }} animate={{ opacity: 1, x: 0 }} className="flex items-center gap-3">
                            <Button variant="ghost" onClick={() => onNavigate('login')}>Login</Button>
                            <Button variant="primary" onClick={() => onNavigate('signup')}>Get Started</Button>
                        </motion.div>
                    </nav>
                    <div className="max-w-7xl mx-auto px-6 pt-16 md:pt-24 pb-32">
                        <div className="grid lg:grid-cols-2 gap-16 items-center">
                            <motion.div initial={{ opacity: 0, y: 30 }} animate={{ opacity: 1, y: 0 }} transition={{ delay: 0.2 }}>
                                <motion.div initial={{ scale: 0.9, opacity: 0 }} animate={{ scale: 1, opacity: 1 }} className="inline-flex items-center gap-2 px-5 py-2.5 rounded-full shadow-neu-raised-sm text-neu-accent text-sm font-semibold mb-8">
                                    <Icon name="Sparkles" size={16} /> Smart Expense Tracking
                                </motion.div>
                                <h1 className="text-5xl md:text-7xl font-extrabold font-display mb-8 leading-tight tracking-tight text-neu-fg">Master Your <br /><span className="text-neu-accent">Student Finances</span></h1>
                                <p className="text-xl text-neu-muted mb-12 max-w-lg leading-relaxed">Track expenses, set budgets, get personalized food suggestions, and generate weekly reports. Built for Indian students.</p>
                                <div className="flex flex-col sm:flex-row gap-4">
                                    <Button variant="primary" className="text-lg px-8 py-4" onClick={() => onNavigate('signup')}>Start Free Today <Icon name="ArrowRight" size={20} /></Button>
                                    <Button variant="secondary" className="text-lg px-8 py-4" onClick={() => onNavigate('login')}>I Have an Account</Button>
                                </div>
                            </motion.div>
                            <motion.div initial={{ opacity: 0, scale: 0.8 }} animate={{ opacity: 1, scale: 1 }} transition={{ delay: 0.4 }} className="hidden lg:flex justify-center">
                                <div className="relative">
                                    <motion.div animate={{ rotate: 360 }} transition={{ duration: 30, repeat: Infinity, ease: "linear" }} className="w-80 h-80 rounded-full shadow-neu-raised flex items-center justify-center">
                                        <motion.div animate={{ rotate: -360 }} transition={{ duration: 20, repeat: Infinity, ease: "linear" }} className="w-60 h-60 rounded-full shadow-neu-inset flex items-center justify-center">
                                            <motion.div animate={{ y: [0, -10, 0] }} transition={{ duration: 3, repeat: Infinity, ease: "easeInOut" }} className="w-40 h-40 rounded-full shadow-neu-raised flex items-center justify-center">
                                                <div className="text-neu-accent"><Icon name="Wallet" size={64} /></div>
                                            </motion.div>
                                        </motion.div>
                                    </motion.div>
                                </div>

                        </div>

                </div>
            );
        };

        // Auth Page
        const AuthPage = ({ type, onNavigate, onSuccess }) => {
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [name, setName] = useState('');
            const [loading, setLoading] = useState(false);
            const { showToast } = useContext(AppContext);
            
            const handleSubmit = async (e) => {
                e.preventDefault();
                setLoading(true);
                try {
                    if (type === 'signup') {
                        const result = await auth.createUserWithEmailAndPassword(email, password);
                        await result.user.updateProfile({ displayName: name });
                        await db.collection('users').doc(result.user.uid).set({
                            email, displayName: name, createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                            isAdmin: email === 'palerugopi@gmail.com'
                        });
                        await db.collection('users').doc(result.user.uid).collection('settings').doc('preferences').set({
                            dailyBudget: 500, weeklyBudget: 3500, monthlyBudget: 15000, bankBalance: 0
                        });
                        showToast('Account created successfully!', 'success');
                    } else {
                        await auth.signInWithEmailAndPassword(email, password);
                        showToast('Welcome back!', 'success');
                    }
                    onSuccess();
                } catch (error) { showToast(error.message, 'error'); }
                setLoading(false);
            };
            
            const handleGoogleSignIn = async () => {
                try {
                    const provider = new firebase.auth.GoogleAuthProvider();
                    const result = await auth.signInWithPopup(provider);
                    const userDoc = await db.collection('users').doc(result.user.uid).get();
                    if (!userDoc.exists) {
                        await db.collection('users').doc(result.user.uid).set({
                            email: result.user.email, displayName: result.user.displayName, photoURL: result.user.photoURL,
                            createdAt: firebase.firestore.FieldValue.serverTimestamp(), isAdmin: result.user.email === 'palerugopi@gmail.com'
                        });
                        await db.collection('users').doc(result.user.uid).collection('settings').doc('preferences').set({
                            dailyBudget: 500, weeklyBudget: 3500, monthlyBudget: 15000, bankBalance: 0
                        });
                    }
                    showToast('Welcome!', 'success');
                    onSuccess();
                } catch (error) { showToast(error.message, 'error'); }
            };
            
            return (
                <div className="min-h-screen flex items-center justify-center p-6">
                    <motion.div initial={{ opacity: 0, y: 20 }} animate={{ opacity: 1, y: 0 }} className="w-full max-w-md">
                        <Card className="p-8 md:p-10">
                            <button onClick={() => onNavigate('landing')} className="flex items-center gap-2 text-neu-muted hover:text-neu-fg mb-8">
                                <Icon name="ArrowLeft" size={20} /><span className="font-medium">Back to home</span>
                            </button>
                            <h1 className="text-3xl font-extrabold font-display mb-2 text-neu-fg tracking-tight text-center">
                                {type === 'signup' ? 'Create Account' : 'Welcome Back'}
                            </h1>
                            <form onSubmit={handleSubmit} className="space-y-5 mt-6">
                                {type === 'signup' && <Input label="Full Name" icon="User" value={name} onChange={(e) => setName(e.target.value)} required />}
                                <Input label="Email Address" icon="Mail" type="email" value={email} onChange={(e) => setEmail(e.target.value)} required />
                                <Input label="Password" icon="Lock" type="password" value={password} onChange={(e) => setPassword(e.target.value)} required minLength={6} />
                                <Button type="submit" variant="primary" className="w-full mt-6" disabled={loading}>{loading ? "Loading..." : (type === 'signup' ? 'Create Account' : 'Sign In')}</Button>
                            </form>
                            <Button variant="secondary" className="w-full mt-4" onClick={handleGoogleSignIn}>Continue with Google</Button>
                            <p className="text-center mt-8 text-neu-muted">
                                {type === 'signup' ? 'Already have an account?' : "Don't have an account?"} 
                                <button onClick={() => onNavigate(type === 'signup' ? 'login' : 'signup')} className="text-neu-accent font-semibold ml-1">{type === 'signup' ? 'Sign In' : 'Create Account'}</button>
                            </p>
                        </Card>
                    </motion.div>
                </div>
            );
        };

        // Dashboard
        const Dashboard = ({ user, expenses, settings, onNavigate }) => {
            const todayTotal = expenses.filter(e => e.date === getToday() && e.type !== 'credit').reduce((sum, e) => sum + parseFloat(e.amount), 0);
            const weekTotal = (() => {
                const today = new Date();
                const weekStart = new Date(today);
                weekStart.setDate(today.getDate() - today.getDay());
                return expenses.filter(e => new Date(e.date) >= weekStart && e.type !== 'credit').reduce((sum, e) => sum + parseFloat(e.amount), 0);
            })();
            const monthTotal = (() => {
                const today = new Date();
                const monthStart = new Date(today.getFullYear(), today.getMonth(), 1);
                return expenses.filter(e => new Date(e.date) >= monthStart && e.type !== 'credit').reduce((sum, e) => sum + parseFloat(e.amount), 0);
            })();
            
            const dailyPercentage = Math.min((todayTotal / settings.dailyBudget) * 100, 100);
            const remaining = Math.max(settings.dailyBudget - todayTotal, 0);
            const status = dailyPercentage < 50 ? { color: '#38B2AC', text: 'On Track' } : dailyPercentage < 80 ? { color: '#F59E0B', text: 'Watch Out' } : { color: '#EF4444', text: 'Over Budget' };
            const greeting = new Date().getHours() < 12 ? 'Good Morning' : new Date().getHours() < 18 ? 'Good Afternoon' : 'Good Evening';
            
            const categoryTotals = {};
            expenses.filter(e => e.type !== 'credit').forEach(e => {
                if (!categoryTotals[e.category]) categoryTotals[e.category] = 0;
                categoryTotals[e.category] += parseFloat(e.amount);
            });

            // Recent expenses
            const expensesByDate = {};
            expenses.forEach(e => {
                if (!expensesByDate[e.date]) expensesByDate[e.date] = [];
                expensesByDate[e.date].push(e);
            });
            
            const chartRef = useRef(null);
            const chartInstance = useRef(null);
            useEffect(() => {

                        <div className="grid grid-cols-2 gap-4">

                                <div className="mt-4 h-2 rounded-full shadow-neu-inset-sm overflow-hidden"><motion.div initial={{ width: 0 }} animate={{ width: `${Math.min((weekTotal / settings.weeklyBudget) * 100, 100)}%` }} className="h-full rounded-full bg-neu-accent" /></div>

                            <Card>

                                <h3 className="text-2xl font-bold font-display text-neu-fg tracking-tight">{formatCurrency(monthTotal)}</h3>

                            </Card>
                        </div>

                        {Object.keys(categoryTotals).length > 0 && <Card><h3 className="text-lg font-bold font-display mb-6 text-neu-fg">Spending by Category</h3><div className="h-64"><canvas ref={chartRef}></canvas></div></Card>}
                        
                        {/* Recent Expenses Preview */}
                        <Card>
                            <div className="flex justify-between items-center mb-6">
                                <h3 className="text-lg font-bold font-display text-neu-fg">Recent Activity</h3>
                                <button onClick={() => onNavigate('history')} className="text-neu-accent font-semibold hover:underline flex items-center gap-1">View All <Icon name="ArrowRight" size={16} /></button>
                            </div>
                            <div className="space-y-3">
                                {Object.entries(expensesByDate).slice(0, 2).map(([date, exps]) => (
                                    <div key={date} className="mb-5">
                                        <div className="flex justify-between items-center mb-4 pb-3"><p className="text-neu-muted text-sm font-medium">{formatDate(date)}</p></div>
                                        {exps.slice(0, 3).map(expense => {

        // Add Expense Page
        const AddExpensePage = ({ onNavigate, onAdd }) => {

            const [itemName, setItemName] = useState('');

                            <Button type="submit" variant="primary" className="w-full py-4 text-lg" disabled={loading}>{loading ? "Saving..." : 'Add Expense'}</Button>
                        </form>
                    </div>
                </div>
            );
        };

        // History Page (UPDATED PDF)
        const HistoryPage = ({ expenses, onDelete, onNavigate, settings }) => {
            const [search, setSearch] = useState('');
            const expensesByDate = {};
            expenses.filter(e => e.itemName.toLowerCase().includes(search.toLowerCase())).forEach(e => { if (!expensesByDate[e.date]) expensesByDate[e.date] = []; expensesByDate[e.date].push(e); });
            
            const generatePDF = () => {
                const doc = new window.jspdf.jsPDF();
                
                // Color Scheme
                const bgCol = [224, 229, 236]; // #E0E5EC
                const textCol = [61, 72, 82]; // #3D4852
                const accentCol = [108, 99, 255]; // #6C63FF
                
                // Header
                doc.setFillColor(...bgCol);
                doc.rect(0, 0, 210, 297, 'F');
                doc.setFontSize(22); doc.setTextColor(...accentCol); doc.text("Expensa - Statement", 14, 20);
                doc.setFontSize(10); doc.setTextColor(...textCol); 
                doc.text(`Generated on: ${new Date().toLocaleDateString('en-IN')}`, 14, 28);
                // CLEAN BALANCE (No Rupee symbol to fix alignment)
                doc.text(`Current Balance: Rs. ${parseFloat(settings.bankBalance).toLocaleString('en-IN')}`, 14, 34);

                let currentBal = settings.bankBalance;
                const rows = [];
                // Reverse calculation for running balance
                expenses.forEach((e, index) => {
                    const balAfter = currentBal;
                    const isCredit = e.type === 'credit';
                    const amountVal = parseFloat(e.amount);
                    
                    rows.push([
                        expenses.length - index,
                        formatDate(e.date),
                        isCredit ? 'Income' : (categories.find(c=>c.id===e.category)?.name || 'Custom'),
                        e.itemName,
                        isCredit ? 'Credit' : 'Debit',
                        formatCurrencyPDF(amountVal), // Use clean format
                        formatCurrencyPDF(balAfter)   // Use clean format
                    ]);
                    
                    if (isCredit) currentBal -= amountVal; else currentBal += amountVal;
                });

                doc.autoTable({
                    startY: 40,
                    head: [['S.No', 'Date', 'Category', 'Description', 'Type', 'Price', 'Balance']],
                    body: rows,
                    theme: 'grid',
                    styles: { fillColor: [240, 244, 248], textColor: textCol, lineColor: [200, 200, 200], font: "helvetica", fontSize: 9, cellPadding: 3 },
                    headStyles: { fillColor: accentCol, textColor: [255, 255, 255], fontStyle: 'bold', halign: 'center' },
                    columnStyles: {
                        0: { cellWidth: 15, halign: 'center' }, // S.No
                        1: { cellWidth: 25 }, // Date
                        2: { cellWidth: 25 }, // Category
                        3: { cellWidth: 'auto' }, // Description (Flexible)
                        4: { cellWidth: 20, fontStyle: 'bold', halign: 'center' }, // Type
                        5: { cellWidth: 30, halign: 'right' }, // Price
                        6: { cellWidth: 30, halign: 'right', fontStyle: 'bold' } // Balance
                    },
                    didParseCell: function(data) {
                        if (data.section === 'body') {
                            const type = data.row.raw[4]; // Check Type Column
                            // Green for Credit, Red for Debit
                            if (type === 'Credit') {
                                if (data.column.index === 4 || data.column.index === 5) data.cell.styles.textColor = [56, 178, 172]; // Green
                            } else {
                                if (data.column.index === 4 || data.column.index === 5) data.cell.styles.textColor = [239, 68, 68]; // Red
                            }
                        }
                    }
                });
                
                doc.save(`expensa-statement-${new Date().toISOString().slice(0,10)}.pdf`);
            };

            return (
                <div className="min-h-screen pb-24 md:pb-8">
                    <div className="p-6">
                        <div className="flex items-center justify-between mb-6"><h1 className="text-2xl font-bold font-display text-neu-fg">History</h1><Button variant="primary" onClick={generatePDF}><Icon name="Download" size={18} /> Export PDF</Button></div>
                        <Card className="mb-6"><Input icon="Search" placeholder="Search transactions..." value={search} onChange={(e) => setSearch(e.target.value)} /></Card>
                        <div className="space-y-4">
                            {Object.entries(expensesByDate).map(([date, exps]) => (
                                <Card key={date}>
                                    <div className="flex justify-between mb-4"><div className="flex gap-3"><IconWell size="sm" className="text-neu-accent"><Icon name="Calendar" size={18} /></IconWell><p className="font-bold">{formatDateFull(date)}</p></div></div>
                                    <div className="space-y-3">{exps.map(e => {
                                        const isCredit = e.type === 'credit';
                                        return (
                                            <div key={e.id} className="flex justify-between items-center p-4 rounded-neu-sm shadow-neu-inset">
                                                <div className="flex gap-4">
                                                    <IconWell size="md" style={{ color: isCredit ? '#38B2AC' : categories.find(c=>c.id===e.category)?.color }}>
                                                        <Icon name={isCredit ? 'Wallet' : (categories.find(c=>c.id===e.category)?.icon || 'Plus')} />
                                                    </IconWell>
                                                    <div>
                                                        <p className="font-semibold">{e.itemName}</p>
                                                        <p className="text-neu-muted text-sm">{isCredit ? `Source: ${e.customCategoryName}` : categories.find(c=>c.id===e.category)?.name}</p>
                                                    </div>
                                                </div>
                                                <div className="flex items-center gap-3">
                                                    <p className={`font-bold ${isCredit ? 'text-neu-accent-secondary' : 'text-red-500'}`}>
                                                        {isCredit ? '+' : '-'}{formatCurrency(e.amount)}
                                                    </p>
                                                    <button onClick={() => onDelete(e.id)} className="text-red-500"><Icon name="Trash2" size={16} /></button>
                                                </div>
                                            </div>
                                        );
                                    })}</div>
                                </Card>
                            ))}
                        </div>
                    </div>
                </div>
            );
        };

        // Food Page
        const FoodPage = ({ settings }) => {
            const [budget, setBudget] = useState(Math.round(settings.dailyBudget * 0.5));
            const getSuggestions = (b) => {
                const combos = [];
                for(let i=0;i<afternoonMeals.length;i++) for(let j=0;j<nightMeals.length;j++) {
                    const af=afternoonMeals[i], nf=nightMeals[j], total=foodPrices[af]+foodPrices[nf];
                    if(total<=b && af!==nf) combos.push({ after: af, night: nf, total, save: b-total });
                }
                return combos.sort((a,b)=>b.save-a.save).slice(0,5);
            };
            const suggestions = getSuggestions(budget);
            return (
                <div className="min-h-screen pb-24 md:pb-8"><div className="p-6"><h1 className="text-2xl font-bold font-display mb-6">Food Suggestions</h1><Card className="mb-6"><Input label="Daily Food Budget" type="number" value={budget} onChange={(e)=>setBudget(e.target.value)} /></Card>
                <Card><h3 className="mb-4 font-bold">Best Combos</h3>{suggestions.map((c,i)=>(<div key={i} className="p-4 mb-4 rounded-neu-sm shadow-neu-inset"><div className="flex justify-between font-bold mb-2"><span>Combo {i+1}</span><span className="text-neu-accent-secondary">Save {formatCurrency(c.save)}</span></div><div className="grid grid-cols-2 gap-4"><div className="p-2 rounded shadow-neu-raised-sm"><p className="text-xs text-neu-muted">Afternoon</p><p>{c.after}</p></div><div className="p-2 rounded shadow-neu-raised-sm"><p className="text-xs text-neu-muted">Night</p><p>{c.night}</p></div></div></div>))}</Card></div></div>
            );
        };

        // Reports Page
        const ReportsPage = ({ expenses, settings }) => {
            const chartRef = useRef(null);
            const chartInstance = useRef(null);
            useEffect(() => {
                if (chartRef.current) {
                    if (chartInstance.current) chartInstance.current.destroy();
                    const ctx = chartRef.current.getContext('2d');
                    const days = [], totals = [];
                    for(let i=6;i>=0;i--) { const d=new Date(); d.setDate(d.getDate()-i); days.push(d.toLocaleDateString('en-IN',{weekday:'short'})); totals.push(expenses.filter(e=>e.date===d.toISOString().split('T')[0] && e.type !== 'credit').reduce((s,e)=>s+parseFloat(e.amount),0)); }
                    chartInstance.current = new Chart(ctx, { type: 'bar', data: { labels: days, datasets: [{ data: totals, backgroundColor: '#6C63FF', borderRadius: 8 }] }, options: { responsive: true, plugins: { legend: { display: false } } } });
                }
                return () => { if(chartInstance.current) chartInstance.current.destroy(); };
            }, [expenses]);
            return (
                <div className="min-h-screen pb-24 md:pb-8"><div className="p-6"><h1 className="text-2xl font-bold font-display mb-6">Reports</h1><Card className="mb-6"><div className="h-56"><canvas ref={chartRef}></canvas></div></Card></div></div>
            );
        };

        // Settings Page (UPDATED WITH ADD FUNDS & SOURCE)
        const SettingsPage = ({ user, settings, onSaveSettings, onSignOut, onAddFunds }) => {
            const [dailyBudget, setDailyBudget] = useState(settings.dailyBudget);
            const [weeklyBudget, setWeeklyBudget] = useState(settings.weeklyBudget);
            const [monthlyBudget, setMonthlyBudget] = useState(settings.monthlyBudget);
            const [bankBalance, setBankBalance] = useState(settings.bankBalance || 0);
            
            // New state for Add Funds
            const [showAddFunds, setShowAddFunds] = useState(false);
            const [fundAmount, setFundAmount] = useState('');
            const [fundSource, setFundSource] = useState('');
            
            const [loading, setLoading] = useState(false);
            const { showToast } = useContext(AppContext);
            
            const handleSave = async (e) => {
                e.preventDefault();
                setLoading(true);
                try {
                    await onSaveSettings({ dailyBudget, weeklyBudget, monthlyBudget, bankBalance });
                    showToast('Settings saved!', 'success');
                } catch (error) { showToast(error.message, 'error'); }
                setLoading(false);
            };

            const handleAddFundsClick = async () => {
                if(!fundAmount || !fundSource) return showToast('Please enter amount and source', 'error');
                setLoading(true);
                try {
                    await onAddFunds(parseFloat(fundAmount), fundSource);
                    showToast(`Added ₹${fundAmount} from ${fundSource}`, 'success');
                    setFundAmount(''); setFundSource(''); setShowAddFunds(false);
                } catch(err) { showToast(err.message, 'error'); }
                setLoading(false);
            };
            
            return (
                <div className="min-h-screen pb-24 md:pb-8">
                    <div className="p-6">
                        <h1 className="text-2xl font-bold font-display mb-6 text-neu-fg">Settings</h1>
                        <Card className="mb-6"><h3 className="mb-5 font-bold">Profile</h3><div className="flex items-center gap-5"><IconWell size="lg" className="text-neu-accent text-2xl">{user?.displayName?.charAt(0)}</IconWell><div><p className="text-xl font-bold">{user?.displayName}</p><p className="text-neu-muted">{user?.email}</p></div></div></Card>
                        <Card className="mb-6">

                                    {!showAddFunds ? (

                                    ) : (

                                            <Input label="Amount (₹)" type="number" value={fundAmount} onChange={(e) => setFundAmount(e.target.value)} placeholder="e.g. 5000" />
                                            <Input label="Source (By whom?)" value={fundSource} onChange={(e) => setFundSource(e.target.value)} placeholder="e.g. Dad, Salary" />
                                            <div className="flex gap-2">
                                                <button type="button" onClick={() => setShowAddFunds(false)} className="flex-1 py-2 rounded-neu-sm shadow-neu-raised text-xs font-bold text-neu-muted">Cancel</button>
                                                <button type="button" onClick={handleAddFundsClick} className="flex-1 py-2 rounded-neu-sm bg-neu-accent text-white shadow-lg text-xs font-bold">Confirm</button>
                                            </div>
                                        </motion.div>
                                    )}
                                </div>
                                <Input label="Daily Budget (₹)" type="number" value={dailyBudget} onChange={(e) => setDailyBudget(parseInt(e.target.value))} />
                                <Input label="Weekly Budget (₹)" type="number" value={weeklyBudget} onChange={(e) => setWeeklyBudget(parseInt(e.target.value))} />
                                <Input label="Monthly Budget (₹)" type="number" value={monthlyBudget} onChange={(e) => setMonthlyBudget(parseInt(e.target.value))} />
                                <Button type="submit" variant="primary" className="w-full" disabled={loading}>Save Settings</Button>
                            </form>
                        </Card>
                        <motion.button onClick={onSignOut} className="w-full py-4 rounded-neu-sm shadow-neu-raised text-red-500 font-bold flex justify-center gap-3"><Icon name="LogOut" size={20} /> Sign Out</motion.button>
                    </div>
                </div>
            );

        // Admin Page
        const AdminPage = () => {
            const [users, setUsers] = useState([]);
            useEffect(() => {
                db.collection('users').get().then(snap => {
                    Promise.all(snap.docs.map(async doc => {
                        const exps = await db.collection('users').doc(doc.id).collection('expenses').get();
                        return { id: doc.id, ...doc.data(), count: exps.docs.length };
                    })).then(setUsers);
                });
            }, []);
            return (
                <div className="min-h-screen pb-24 md:pb-8"><div className="p-6"><h1 className="text-2xl font-bold font-display mb-6">Admin</h1><Card>{users.map(u=>(<div key={u.id} className="flex justify-between p-4 border-b border-gray-200"><span>{u.displayName}</span><span>{u.count} expenses</span></div>))}</Card></div></div>
            );
        };

        // Nav
        const BottomNav = ({ currentPage, onNavigate, isAdmin }) => {
            const navItems = [{ id: 'dashboard', icon: 'Home', label: 'Home' }, { id: 'history', icon: 'Clock', label: 'History' }, { id: 'food', icon: 'UtensilsCrossed', label: 'Food' }, { id: 'reports', icon: 'BarChart3', label: 'Reports' }, { id: 'settings', icon: 'Settings', label: 'Settings' }];
            if (isAdmin) navItems.push({ id: 'admin', icon: 'Shield', label: 'Admin' });
            return (
                <nav className="fixed bottom-0 left-0 right-0 md:top-0 md:bottom-auto bg-neu-base shadow-neu-raised z-50">
                    <div className="max-w-lg mx-auto flex justify-around py-3">
                        {navItems.map(item => (<motion.button key={item.id} whileTap={{ scale: 0.9 }} onClick={() => onNavigate(item.id)} className={`flex flex-col items-center py-2 px-3 rounded-neu-sm ${currentPage === item.id ? 'shadow-neu-inset text-neu-accent' : 'text-neu-muted'}`}><Icon name={item.icon} size={22} /><span className="text-xs mt-1 font-medium">{item.label}</span></motion.button>))}
                    </div>
                </nav>
            );
        };

        // Main App
        const App = () => {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [currentPage, setCurrentPage] = useState('landing');
            const [expenses, setExpenses] = useState([]);
            const [settings, setSettings] = useState({ dailyBudget: 500, weeklyBudget: 3500, monthlyBudget: 15000, bankBalance: 0 });
            const [isAdmin, setIsAdmin] = useState(false);
            const [toast, setToast] = useState(null);
            
            const showToast = (message, type = 'success') => { setToast({ message, type }); setTimeout(() => setToast(null), 3000); };
            
            useEffect(() => {
                auth.onAuthStateChanged(async (u) => {
                    setUser(u); setLoading(false);
                    if (u) {
                        setCurrentPage('dashboard');
                        const d = await db.collection('users').doc(u.uid).get();
                        if (d.exists) setIsAdmin(d.data().isAdmin);
                        const s = await db.collection('users').doc(u.uid).collection('settings').doc('preferences').get();
                        if (s.exists) setSettings(prev => ({ ...prev, ...s.data() }));
                        const e = await db.collection('users').doc(u.uid).collection('expenses').orderBy('date', 'desc').get();
                        setExpenses(e.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                    } else setCurrentPage('landing');
                });
            }, []);
            
            const handleAddExpense = async (expense) => {
                await db.collection('users').doc(user.uid).collection('expenses').add({ ...expense, timestamp: firebase.firestore.FieldValue.serverTimestamp() });
                // Update Balance
                const newBalance = (settings.bankBalance || 0) - parseFloat(expense.amount);
                await db.collection('users').doc(user.uid).collection('settings').doc('preferences').update({ bankBalance: newBalance });
                setSettings(prev => ({ ...prev, bankBalance: newBalance }));
                
                const e = await db.collection('users').doc(user.uid).collection('expenses').orderBy('date', 'desc').get();
                setExpenses(e.docs.map(doc => ({ id: doc.id, ...doc.data() })));
            };

            const handleAddFunds = async (amount, source) => {
                // 1. Create Transaction Record
                await db.collection('users').doc(user.uid).collection('expenses').add({
                    type: 'credit',
                    category: 'income',
                    customCategoryName: source, // Used as 'Source'
                    itemName: 'Funds Added',
                    amount: amount,
                    date: getToday(),
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });

                // 2. Update Balance
                const newBalance = (settings.bankBalance || 0) + amount;
                await db.collection('users').doc(user.uid).collection('settings').doc('preferences').update({ bankBalance: newBalance });
                setSettings(prev => ({ ...prev, bankBalance: newBalance }));

                // 3. Refresh Data
                const e = await db.collection('users').doc(user.uid).collection('expenses').orderBy('date', 'desc').get();
                setExpenses(e.docs.map(doc => ({ id: doc.id, ...doc.data() })));
            };
            
            const handleDeleteExpense = async (expenseId) => {
                const expenseToDelete = expenses.find(e => e.id === expenseId);
                if (expenseToDelete) {
                    let newBalance = settings.bankBalance || 0;
                    if (expenseToDelete.type === 'credit') {
                        newBalance -= parseFloat(expenseToDelete.amount); // If removing added funds, subtract balance
                    } else {
                        newBalance += parseFloat(expenseToDelete.amount); // If removing expense, add balance back
                    }
                    await db.collection('users').doc(user.uid).collection('settings').doc('preferences').update({ bankBalance: newBalance });
                    setSettings(prev => ({ ...prev, bankBalance: newBalance }));
                }
                await db.collection('users').doc(user.uid).collection('expenses').doc(expenseId).delete();
                setExpenses(expenses.filter(e => e.id !== expenseId));
                showToast('Transaction deleted', 'success');
            };
            
            const handleSaveSettings = async (newSettings) => {
                await db.collection('users').doc(user.uid).collection('settings').doc('preferences').set(newSettings, { merge: true });
                setSettings(s => ({ ...s, ...newSettings }));
            };
            
            const handleSignOut = async () => { await auth.signOut(); setUser(null); setCurrentPage('landing'); };
            
            if (loading) return <div className="min-h-screen flex items-center justify-center bg-neu-base">Loading...</div>;
            
            return (
                <AppContext.Provider value={{ showToast }}>
                    <div className="min-h-screen bg-neu-base text-neu-fg">
                        <AnimatePresence mode="wait">{toast && <Toast {...toast} onClose={() => setToast(null)} />}</AnimatePresence>
                        <AnimatePresence mode="wait">
                            {!user ? (
                                <motion.div key={currentPage} initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }}>
                                    {currentPage === 'landing' ? <LandingPage onNavigate={setCurrentPage} /> : <AuthPage type={currentPage} onNavigate={setCurrentPage} onSuccess={()=>{}} />}
                                </motion.div>
                            ) : (
                                <motion.div initial={{ opacity: 0 }} animate={{ opacity: 1 }}>
                                    <BottomNav currentPage={currentPage} onNavigate={setCurrentPage} isAdmin={isAdmin} />
                                    <div className="md:pt-20">
                                        <AnimatePresence mode="wait">
                                            <motion.div key={currentPage} initial={{ opacity: 0, y: 20 }} animate={{ opacity: 1, y: 0 }} exit={{ opacity: 0, y: -20 }}>
                                                {currentPage === 'dashboard' && <Dashboard user={user} expenses={expenses} settings={settings} onNavigate={setCurrentPage} />}
                                                {currentPage === 'add' && <AddExpensePage onNavigate={setCurrentPage} onAdd={handleAddExpense} />}
                                                {currentPage === 'history' && <HistoryPage expenses={expenses} onDelete={handleDeleteExpense} onNavigate={setCurrentPage} settings={settings} />}
                                                {currentPage === 'food' && <FoodPage settings={settings} />}
                                                {currentPage === 'reports' && <ReportsPage expenses={expenses} settings={settings} />}
                                                {currentPage === 'settings' && <SettingsPage user={user} settings={settings} onSaveSettings={handleSaveSettings} onSignOut={handleSignOut} onAddFunds={handleAddFunds} />}
                                                {currentPage === 'admin' && isAdmin && <AdminPage />}
                                            </motion.div>
                                        </AnimatePresence>
                                    </div>
                                </motion.div>
                            )}
                        </AnimatePresence>
                    </div>
                </AppContext.Provider>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
